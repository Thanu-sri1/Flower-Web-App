apiVersion: apps/v1
kind: Deployment
metadata: 
  name: flower-app
  namespace: chandu-ns 
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2
      maxSurge: 2
  selector:
    matchLabels:
      app: flower
  template:
    metadata:
      labels:
        app: flower 
    spec:
      containers:
        - name: flower-app
          image: muralisocial123/kyndrl-flower-app:v1.1.0
          ports:
            - containerPort: 3015
          resources:
            requests: 
              memory: "256Mi"
              cpu: "158m"
            limits:
              memory: "512Mi" 
              cpu: "254m"
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef: flower-secret
                key: MONGO_URI    

---

apiVersion: v1
kind: Service
metadata:
  name: flower-service
  namespace: chandu-ns
spec:
  selector:
    app: flower
  ports:
    - port: 3016
      targetPort: 3015
  type: NodePort  

         
              

  

  