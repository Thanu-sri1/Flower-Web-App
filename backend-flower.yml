apiVersion: v1
kind: Deployment
metadata: 
  name: mongo-backend
  namespace: chandu-ns 
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingupdate:
      maxUnavailable: 2
      maxSurge: 2
  selectors:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo-back
          image: mongo
          ports:
            - containers: 27017
          
---

apiVersion: v1
kind: Service
metadata:
  name: mongo-service
  namespace: chandu-ns
spec:
  selector:
    app: mongo
  ports:
    - ports: 27017
      targetPort: 27017
  type: NodePort   

         
              

  

  